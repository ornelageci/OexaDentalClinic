<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <meta name="oexa-api-url" content="http://localhost:5095">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav id="adminNav" data-admin-page="dashboard"></nav>

    <section class="py-4">
        <div class="container-fluid px-3 px-lg-4">
            <h2 class="mb-4">Manage everything</h2>
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-12"><p class="text-muted">Loading overview…</p></div>
            </div>
            <h5 class="mb-3">Quick links</h5>
            <div class="row g-3" id="quickLinksRow">
                <div class="col-md-6 col-lg-3">
                    <a href="users.html" class="card portal-card text-decoration-none h-100">
                        <div class="card-body">
                            <h6 class="text-primary mb-1">Users</h6>
                            <p class="small text-muted mb-0">Staff, roles, dentist types</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="treatments.html" class="card portal-card text-decoration-none h-100">
                        <div class="card-body">
                            <h6 class="text-primary mb-1">Treatments</h6>
                            <p class="small text-muted mb-0">Prices, duration, catalog</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="appointments.html" class="card portal-card text-decoration-none h-100">
                        <div class="card-body">
                            <h6 class="text-primary mb-1">Appointments</h6>
                            <p class="small text-muted mb-0">All visits, all dentists</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="reports.html" class="card portal-card text-decoration-none h-100">
                        <div class="card-body">
                            <h6 class="text-primary mb-1">Revenue</h6>
                            <p class="small text-muted mb-0">Receipts, TVSH, by month</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/shared/api.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/admin/admin-nav.js"></script>
    <script src="../../js/admin/dashboard.js"></script>
</body>
</html>
