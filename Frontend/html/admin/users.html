<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav class="navbar portal-nav py-3">
        <div class="container">
            <a href="dashboard.html" class="navbar-brand">Admin Panel</a>
            <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>
    <section class="py-4">
        <div class="container">
            <h2 class="mb-3">Manage Users</h2>

            <div class="row g-4 mb-4">
                <div class="col-lg-6">
                    <div class="card portal-card h-100">
                        <div class="card-body">
                            <h5 class="mb-3">User roles</h5>
                            <p class="small text-muted">Roles appear in the dropdown when adding users.</p>
                            <ul class="list-group list-group-flush mb-3" id="rolesList"></ul>
                            <div class="input-group input-group-sm">
                                <input class="form-control" id="newRoleName" placeholder="New role name (e.g. Hygienist)">
                                <button class="btn btn-outline-primary" type="button" id="addRoleBtn">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card portal-card h-100">
                        <div class="card-body">
                            <h5 class="mb-3">Dentist types</h5>
                            <p class="small text-muted">Specialist types for dentists and treatments.</p>
                            <ul class="list-group list-group-flush mb-3" id="categoriesList"></ul>
                            <div class="input-group input-group-sm">
                                <input class="form-control" id="newCategoryName" placeholder="New type (e.g. Endodontics)">
                                <button class="btn btn-outline-primary" type="button" id="addCategoryBtn">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Filter by role</label>
                    <select class="form-select" id="roleFilter">
                        <option value="">All roles</option>
                    </select>
                </div>
            </div>

            <div class="card portal-card mb-4">
                <div class="card-body">
                    <h4>Add new user</h4>
                    <div class="row g-2">
                        <div class="col-md-3"><input class="form-control" id="newFirst" placeholder="First name"></div>
                        <div class="col-md-3"><input class="form-control" id="newLast" placeholder="Last name"></div>
                        <div class="col-md-3"><input class="form-control" id="newEmail" type="email" placeholder="Email"></div>
                        <div class="col-md-3"><input class="form-control" id="newPass" type="password" placeholder="Password"></div>
                        <div class="col-md-3">
                            <label class="form-label small mb-0">Role</label>
                            <select class="form-select" id="newRole"></select>
                        </div>
                        <div class="col-md-3" id="dentistTypeWrap" style="display:none">
                            <label class="form-label small mb-0">Dentist type</label>
                            <select class="form-select" id="newDentistKey"></select>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button class="btn btn-primary w-100" id="addUserBtn">Add user</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card portal-card">
                <div class="card-body table-responsive">
                    <table class="table table-sm">
                        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Type</th><th></th></tr></thead>
                        <tbody id="usersBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
    <script src="../../js/shared/api.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/admin/users.js"></script>
</body>
</html>
