<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Revenue</title>
    <meta name="oexa-api-url" content="http://localhost:5095">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav id="adminNav" data-admin-page="reports"></nav>
    <section class="py-4">
        <div class="container-fluid px-3 px-lg-4">
            <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
                <div>
                    <h2 class="mb-1">Revenue &amp; receipts</h2>
                    <p class="text-muted mb-0 small">Only <strong>completed</strong> visits with <strong>finalized</strong> receipts. Amounts include TVSH 20%.</p>
                </div>
                <div>
                    <label class="form-label small mb-0">Period (YYYY-MM)</label>
                    <div class="d-flex align-items-center gap-2 flex-wrap" aria-describedby="revPeriodHint">
                        <div class="rev-period-picker d-flex align-items-center">
                            <input type="text" inputmode="numeric" class="form-control font-monospace rev-period-year"
                                id="revYear" maxlength="4" placeholder="2026" aria-label="Year">
                            <span class="rev-period-sep" aria-hidden="true">-</span>
                            <input type="text" inputmode="numeric" class="form-control font-monospace rev-period-month"
                                id="revMonth" maxlength="2" placeholder="06" aria-label="Month (01–12 or 00 for year)">
                        </div>
                        <button type="button" class="btn btn-primary" id="loadRevenueBtn">Load</button>
                    </div>
                    <div id="revPeriodHint" class="form-text text-muted">
                        YEAR-00 : check total revenue of a specific year
                    </div>
                </div>
            </div>
            <div id="reportsContent">
                <p class="text-muted">Enter period and click Load.</p>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/shared/api.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/admin/admin-nav.js"></script>
    <script src="../../js/admin/reports.js"></script>
</body>
</html>
