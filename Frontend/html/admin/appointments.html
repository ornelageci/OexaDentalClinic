<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Appointments</title>
    <meta name="oexa-api-url" content="http://localhost:5095">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav id="adminNav" data-admin-page="appointments"></nav>
    <section class="py-4">
        <div class="container">
            <div class="d-flex justify-content-between mb-3">
                <h2>All Appointments (all dentists)</h2>
                <button class="btn btn-primary btn-sm" id="refreshBtn">Refresh</button>
            </div>
            <div class="card portal-card">
                <div class="card-body table-responsive">
                    <table class="table table-sm portal-table">
                        <thead><tr><th>ID</th><th>Patient</th><th>Date</th><th>Service</th><th>Status</th><th></th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
    <script src="../../js/shared/api.js"></script>
    <script src="../../js/shared/appointment-info.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/admin/admin-nav.js"></script>
    <script src="../../js/admin/appointments.js"></script>

</html>
