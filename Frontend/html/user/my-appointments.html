<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - Oexa Dental Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <nav class="navbar fixed-top" id="navbar"></nav>

    <section class="appointment-section py-5">
        <div class="container">
            <h1 class="display-5 fw-bold text-center mb-4">My Appointments</h1>
            <div id="remindersBox" class="alert alert-info d-none mb-4"></div>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Service</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="myAppointmentsBody">
                        <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-4" id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/shared/api.js"></script>
    <script src="../../js/user/navbar.js"></script>
    <script src="../../js/user/footer.js"></script>
    <script src="../../js/user/animations.js"></script>
    <script src="../../js/user/my-appointments.js"></script>
</body>
</html>
