<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - Oexa Dental Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <nav class="navbar fixed-top" id="navbar"></nav>

    <section class="appointment-section py-5">
        <div class="container">
            <h1 class="display-5 fw-bold text-center mb-4">My Appointments</h1>
            <div id="remindersBox" class="alert alert-info d-none mb-4"></div>
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>Date &amp; time</th>
                            <th>Treatments</th>
                            <th>Dentist</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="myAppointmentsBody">
                        <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <div class="modal fade" id="rateModal" tabindex="-1" aria-labelledby="rateModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="rateModalLabel">Rate your visit</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="rateApptSummary" class="rate-appt-summary mb-4"></div>
                    <label class="form-label fw-semibold">Your rating</label>
                    <div class="rate-stars mb-3" id="rateStars" role="radiogroup" aria-label="Rating 1 to 5 stars">
                        <button type="button" class="rate-star" data-value="1" aria-label="1 star">★</button>
                        <button type="button" class="rate-star" data-value="2" aria-label="2 stars">★</button>
                        <button type="button" class="rate-star" data-value="3" aria-label="3 stars">★</button>
                        <button type="button" class="rate-star" data-value="4" aria-label="4 stars">★</button>
                        <button type="button" class="rate-star" data-value="5" aria-label="5 stars">★</button>
                    </div>
                    <input type="hidden" id="rateValue" value="5">
                    <label class="form-label" for="rateComment">Comments (optional)</label>
                    <textarea class="form-control" id="rateComment" rows="3" placeholder="How was your experience?"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="rateSubmitBtn">Submit rating</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4" id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/shared/api.js"></script>
    <script src="../../js/user/navbar.js"></script>
    <script src="../../js/user/footer.js"></script>
    <script src="../../js/user/animations.js"></script>
    <script src="../../js/user/my-appointments.js"></script>
</body>
</html>
