<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dentist Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav class="navbar portal-nav py-3">
        <div class="container">
            <span class="navbar-brand" id="dentistName">Dentist</span>
            <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <section class="py-4">
        <div class="container">
            <h2 class="mb-3">My Schedule</h2>
            <div class="card portal-card mb-4">
                <div class="card-body table-responsive">
                    <table class="table table-sm">
                        <thead><tr><th>ID</th><th>Patient</th><th>Your visit</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="card portal-card mb-4">
                <div class="card-body">
                    <h4>Treatment record</h4>
                    <input class="form-control mb-2" id="treatmentApptId" placeholder="Appointment ID" readonly>
                    <textarea class="form-control mb-2" id="diagnosis" placeholder="Diagnosis" rows="2"></textarea>
                    <textarea class="form-control mb-2" id="treatment" placeholder="Treatment performed" rows="2"></textarea>
                    <textarea class="form-control mb-2" id="recommendations" placeholder="Recommendations" rows="2"></textarea>
                    <button class="btn btn-primary" id="saveTreatment">Save treatment</button>
                </div>
            </div>

            <div class="card portal-card">
                <div class="card-body">
                    <h4>Receipt – medications (after visit)</h4>
                    <p class="small text-muted">Add each medication. Manager will add prices.</p>
                    <div id="medicationList"></div>
                    <button type="button" class="btn btn-sm btn-outline-secondary mb-2" id="addMedBtn">+ Add medication</button>
                    <button class="btn btn-primary" id="submitReceipt">Submit receipt to manager</button>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/shared/api.js"></script>
    <script src="../../js/shared/appointment-info.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/dentist/dashboard.js"></script>
</body>
</html>
