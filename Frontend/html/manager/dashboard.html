<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav class="navbar portal-nav py-3">
        <div class="container">
            <span class="navbar-brand">Reception / Manager</span>
            <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <section class="py-4">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Check-in</h4>
                            <input class="form-control mb-2" id="checkinId" placeholder="Appointment ID">
                            <button class="btn btn-primary" id="checkinBtn">Check-in</button>
                            <div class="small text-muted mt-2" id="checkinMsg"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Check-out + Receipt</h4>
                            <input class="form-control mb-2" id="checkoutId" placeholder="Appointment ID">
                            <input class="form-control mb-2" id="amount" placeholder="Total amount" type="number" step="0.01">
                            <button class="btn btn-primary" id="checkoutBtn">Check-out</button>
                            <div class="small mt-2" id="checkoutMsg"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Reschedule / Cancel</h4>
                            <div class="row g-2">
                                <div class="col-md-2"><input class="form-control" id="actionId" placeholder="ID"></div>
                                <div class="col-md-3"><input class="form-control" id="newDate" type="date"></div>
                                <div class="col-md-2"><input class="form-control" id="newTime" placeholder="HH:mm"></div>
                                <div class="col-md-2"><button class="btn btn-primary" id="rescheduleBtn">Reschedule</button></div>
                                <div class="col-md-2"><button class="btn btn-outline-danger" id="cancelBtn">Cancel</button></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Assign patient to dentist</h4>
                            <input class="form-control mb-2" id="assignApptId" placeholder="Appointment ID">
                            <select class="form-control mb-2" id="assignDentist"></select>
                            <button class="btn btn-primary" id="assignBtn">Assign</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Financial summary</h4>
                            <div id="financeSummary" class="small text-muted">Loading...</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>Today's appointments</h4>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead><tr><th>ID</th><th>Patient</th><th>Time</th><th>Status</th></tr></thead>
                                    <tbody id="apptBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/shared/api.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/manager/dashboard.js"></script>
</body>
</html>
