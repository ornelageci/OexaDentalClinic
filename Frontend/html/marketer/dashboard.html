<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/portal.css">
</head>
<body class="portal-body">
    <nav class="navbar portal-nav py-3">
        <div class="container">
            <span class="navbar-brand">Marketer</span>
            <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <section class="py-4">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>New promotion</h4>
                            <input class="form-control mb-2" id="title" placeholder="Title">
                            <textarea class="form-control mb-2" id="description" placeholder="Description" rows="2"></textarea>
                            <input class="form-control mb-2" id="discount" type="number" placeholder="Discount %">
                            <input class="form-control mb-2" id="startDate" type="date">
                            <input class="form-control mb-2" id="endDate" type="date">
                            <input class="form-control mb-2" id="audience" placeholder="Target audience">
                            <button class="btn btn-primary" id="addPromo">Add promotion</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="card portal-card">
                        <div class="card-body">
                            <h4>All promotions</h4>
                            <ul class="list-group" id="promoList"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/shared/api.js"></script>
    <script src="../../js/portal/auth.js"></script>
    <script src="../../js/marketer/dashboard.js"></script>
</body>
</html>
